name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x gradlew
          sed -i '/org.gradle.java.home/d' gradle.properties
          ./gradlew build

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version' build.gradle | head -1 | sed 's/version = "//;s/"//;s/\r//')
          SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHA}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" build/libs/SabrinaCarpenterAuth-*.jar \
            --title "SabrinaCarpenterAuth ${VERSION}" \
            --generate-notes
